events { }

http {
    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # PHP-FPM default socket
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        }
    }
}