events { }

http {
    server {
        listen 80;

        root /var/www/html;
        index index.php index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;

            # PHP-FPM service neve a Railway hálózatban
            fastcgi_pass php-fpm:9000;
        }
    }
}